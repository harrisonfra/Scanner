<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VIN Data Viewer</title>

    <!-- PWA + Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- Icons -->
    <link rel="apple-touch-icon" href="UAR.png">
    <link rel="icon" type="image/png" href="UAR.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- ZXing (VIN Scanner) -->
    <script src="https://unpkg.com/@zxing/browser@latest"></script>

    <style>
        /* Scanner container FIX */
        #reader {
            display: none;
            width: 100%;
            max-width: 400px;
            height: 300px;
            margin: 15px auto;
            background: black;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Optional: nicer button spacing */
        #scan-vin-btn {
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>VIN Data Viewer</h1>

    <input type="text" id="search" placeholder="Search make or model...">

    <div id="filters">
        <strong>Filter by Item:</strong>
        <div id="item-filters"></div>
        <button id="clear-filters">Clear Filters</button>
    </div>

    <!-- VIN Scanner -->
    <button id="scan-vin-btn">Scan VIN</button>
    <div id="reader"></div>

    <!-- Mobile Sort -->
    <select id="mobile-sort">
        <option value="">Sort By</option>
        <option value="Year">Year</option>
        <option value="Make">Make</option>
        <option value="Model">Model</option>
        <option value="Average Price">Avg Price</option>
        <option value="Median Price">Median Price</option>
        <option value="Number of Sales">Sales</option>
    </select>

    <!-- Data Table -->
    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    <th data-sort="VIN">VIN</th>
                    <th data-sort="Year">Year</th>
                    <th data-sort="Make">Make</th>
                    <th data-sort="Model">Model</th>
                    <th data-sort="Average Price">Avg Price</th>
                    <th data-sort="Median Price">Median Price</th>
                    <th data-sort="_item">Item</th>
                    <th data-sort="Number of Sales">Sales</th>
                    <th>eBay</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Details Panel -->
    <div id="details" class="hidden">
        <h2>Vehicle Details</h2>
        <p><strong>VIN:</strong> <span id="d-vin"></span></p>
        <p><strong>Query:</strong> <span id="d-query"></span></p>
        <p><strong>Year:</strong> <span id="d-year"></span></p>
        <p><strong>Make:</strong> <span id="d-make"></span></p>
        <p><strong>Model:</strong> <span id="d-model"></span></p>
        <p><strong>Average Price:</strong> $<span id="d-avg"></span></p>
        <p><strong>Median Price:</strong> $<span id="d-med"></span></p>
        <p><strong>Sales Count:</strong> <span id="d-sales"></span></p>
        <button onclick="closeDetails()">Close</button>
    </div>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
