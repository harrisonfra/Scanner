<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN Scanner (Quagga)</title>

<!-- Quagga2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 420px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.viewport {
    width: 100%;
    height: 300px;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 10px;
}

.viewport video,
.viewport canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

canvas.drawingBuffer {
    position: absolute;
    top: 0;
    left: 0;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

button {
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
}

.result {
    margin-top: 10px;
    font-size: 14px;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <h2>VIN Scanner</h2>

    <div id="interactive" class="viewport"></div>

    <button onclick="startScanner()">Start Scanner</button>
    <button onclick="stopScanner()">Stop Scanner</button>

    <input type="text" id="vinInput" placeholder="VIN will appear here">

    <button onclick="decodeVIN()">Decode VIN</button>

    <p id="barcode-result">No barcode detected</p>
    <div id="error" class="error"></div>
    <div id="result" class="result"></div>
</div>

<script>
let scanning = false;

function startScanner() {
    if (scanning) return;

    Quagga.init({
        inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#interactive'),
            constraints: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        },
        locator: {
            patchSize: "medium",
            halfSample: true
        },
        decoder: {
            readers: ["code_39_reader"]
        },
        locate: true
    }, function (err) {
        if (err) {
            console.error(err);
            document.getElementById("error").textContent = "Camera error.";
            return;
        }
        Quagga.start();
        scanning = true;
    });

    Quagga.onDetected(onDetected);
}

function stopScanner() {
    if (scanning) {
        Quagga.stop();
        Quagga.offDetected(onDetected);
        scanning = false;
    }
}

function onDetected(result) {
    const code = result.codeResult.code;

    // VIN validation: 17 chars, no I O Q
    const vinMatch = code.match(/[A-HJ-NPR-Z0-9]{17}/);

    if (vinMatch) {
        const vin = vinMatch[0];

        document.getElementById('barcode-result').textContent = "Detected: " + vin;
        document.getElementById('vinInput').value = vin;

        stopScanner();
        decodeVIN();
    } else {
        document.getElementById('barcode-result').textContent = "Scanned: " + code;
    }
}

async function decodeVIN() {
    const vin = document.getElementById("vinInput").value.trim();
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.innerHTML = "";
    errorDiv.textContent = "";

    if (vin.length !== 17) {
        errorDiv.textContent = "VIN must be 17 characters.";
        return;
    }

    try {
        const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
        const data = await res.json();
        const results = data.Results;

        function get(label) {
            const item = results.find(r => r.Variable === label);
            return item && item.Value ? item.Value : "N/A";
        }

        resultDiv.innerHTML = `
            <p><strong>Make:</strong> ${get("Make")}</p>
            <p><strong>Model:</strong> ${get("Model")}</p>
            <p><strong>Year:</strong> ${get("Model Year")}</p>
            <p><strong>Trim:</strong> ${get("Trim")}</p>
            <p><strong>Body:</strong> ${get("Body Class")}</p>
        `;
    } catch (err) {
        errorDiv.textContent = "Failed to fetch VIN data.";
    }
}
</script>

</body>
</html>
