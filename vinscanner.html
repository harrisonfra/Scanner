<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN Scanner Tool</title>

<!-- Barcode Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        padding: 20px;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 420px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    #reader {
        width: 100%;
        margin-top: 10px;
        display: none;
    }

    .result {
        margin-top: 15px;
        font-size: 14px;
    }

    .error {
        color: red;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>VIN Scanner</h1>

    <input type="text" id="vinInput" placeholder="Enter or scan VIN..." maxlength="17">
    <button onclick="decodeVIN()">Decode VIN</button>
    <button onclick="startScanner()">Start Camera Scan</button>
    <button onclick="stopScanner()">Stop Camera</button>

    <div id="reader"></div>

    <div id="error" class="error"></div>
    <div id="result" class="result"></div>
</div>

<script>
let scanner = null;

function startScanner() {
    const readerDiv = document.getElementById("reader");
    readerDiv.style.display = "block";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" }, // back camera
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            // VINs are 17 characters
            if (decodedText.length === 17) {
                document.getElementById("vinInput").value = decodedText;
                stopScanner();
                decodeVIN();
            }
        },
        (errorMessage) => {
            // ignore scan errors
        }
    ).catch(err => {
        console.error(err);
        document.getElementById("error").textContent = "Camera access failed.";
    });
}

function stopScanner() {
    if (scanner) {
        scanner.stop().then(() => {
            document.getElementById("reader").style.display = "none";
        }).catch(err => console.error(err));
    }
}

async function decodeVIN() {
    const vin = document.getElementById("vinInput").value.trim();
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.innerHTML = "";
    errorDiv.textContent = "";

    if (vin.length !== 17) {
        errorDiv.textContent = "VIN must be exactly 17 characters.";
        return;
    }

    try {
        const response = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
        const data = await response.json();
        const results = data.Results;

        function getValue(label) {
            const item = results.find(r => r.Variable === label);
            return item && item.Value ? item.Value : "N/A";
        }

        resultDiv.innerHTML = `
            <p><strong>Make:</strong> ${getValue("Make")}</p>
            <p><strong>Model:</strong> ${getValue("Model")}</p>
            <p><strong>Year:</strong> ${getValue("Model Year")}</p>
            <p><strong>Trim:</strong> ${getValue("Trim")}</p>
            <p><strong>Body:</strong> ${getValue("Body Class")}</p>
            <p><strong>Engine:</strong> ${getValue("Engine Model")}</p>
            <p><strong>Fuel:</strong> ${getValue("Fuel Type - Primary")}</p>
            <p><strong>Drive:</strong> ${getValue("Drive Type")}</p>
        `;
    } catch (err) {
        errorDiv.textContent = "Error fetching VIN data.";
        console.error(err);
    }
}

// Enter key support (good for hardware scanners)
document.getElementById("vinInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        decodeVIN();
    }
});
</script>

</body>
</html>
