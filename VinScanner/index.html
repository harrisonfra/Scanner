<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIN Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <link rel="stylesheet" href="vinscanner.css" />
    <link rel="manifest" href="manifest.json">
</head>

<body class="light">

    <div class="topbar">
        <a href="../index.html" class="back-link">← VIN Viewer</a>
        <span class="brand">VIN Scanner</span>
        <button id="refreshBtn" class="icon-btn" title="Hard Refresh">↺</button>
    </div>

    <div class="page">

        <div class="scanner-card">
            <div id="interactive" class="scanner-viewport">
                <div class="scan-box"></div>
            </div>

            <div class="scanner-controls">
                <button id="startBtn" class="btn-primary">Start Scanner</button>
                <button id="stopBtn" class="btn-ghost">Stop</button>
            </div>

            <div class="vin-row">
                <input type="text" id="vinInput" placeholder="VIN" maxlength="17" class="vin-input" />
                <button id="decodeBtn" class="btn-accent">Decode</button>
            </div>

            <div id="barcode-result" class="scanner-status">No barcode detected</div>
            <div id="error" class="scanner-error"></div>
        </div>

        <div id="result"></div>

    </div>

    <script>

        let scanning = false;
        let detectorBound = false;
        let lastVin = "";
        let lastTime = 0;

        const vinInput     = document.getElementById("vinInput");
        const resultDiv    = document.getElementById("result");
        const errorDiv     = document.getElementById("error");
        const barcodeResult = document.getElementById("barcode-result");

        document.getElementById("startBtn").addEventListener("click", startScanner);
        document.getElementById("stopBtn").addEventListener("click", stopScanner);
        document.getElementById("decodeBtn").addEventListener("click", decodeVIN);
        document.getElementById("refreshBtn").addEventListener("click", hardRefresh);

        function startScanner() {
            if (scanning) return;
            errorDiv.textContent = "";

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector("#interactive"),
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                },
                locator: { patchSize: "medium", halfSample: false },
                decoder: { readers: ["code_39_reader", "code_128_reader"] },
                locate: false
            }, function (err) {
                if (err) {
                    console.error(err);
                    errorDiv.textContent = "Failed to access camera.";
                    return;
                }
                if (!detectorBound) {
                    Quagga.onDetected(onDetected);
                    detectorBound = true;
                }
                Quagga.start();
                scanning = true;
            });
        }

        function stopScanner() {
            if (!scanning) return;
            Quagga.offDetected(onDetected);
            Quagga.stop();
            const video = document.querySelector("#interactive video");
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            detectorBound = false;
            scanning = false;
        }

        function onDetected(result) {
            const cleaned = result.codeResult.code.replace(/[^A-Z0-9]/gi, "").toUpperCase();
            const vinMatch = cleaned.match(/[A-HJ-NPR-Z0-9]{17}/);
            if (!vinMatch) {
                barcodeResult.textContent = `Scanned: ${cleaned}`;
                return;
            }
            const vin = vinMatch[0];
            const now = Date.now();
            if (vin === lastVin && now - lastTime < 1000) return;
            lastVin = vin;
            lastTime = now;
            barcodeResult.textContent = "Detected: " + vin;
            vinInput.value = vin;
            stopScanner();
            decodeVIN();
        }

        async function decodeVIN() {
            const vin = vinInput.value.trim().toUpperCase();
            resultDiv.innerHTML = "";
            errorDiv.textContent = "";

            if (!/^[A-HJ-NPR-Z0-9]{17}$/.test(vin)) {
                errorDiv.textContent = "Invalid VIN. Must be 17 characters, no I, O, or Q.";
                return;
            }

            resultDiv.innerHTML = `<p class="loading">Loading…</p>`;

            try {
                const response = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
                if (!response.ok) throw new Error("Network response failed");
                const data = await response.json();
                const results = data.Results;

                function get(label) {
                    const item = results.find(r => r.Variable === label);
                    return (!item || item.Value === null || item.Value === "" || item.Value === "Not Applicable") ? "N/A" : item.Value;
                }

                function val(v) { return v !== "N/A" ? v : "—"; }

                const sections = [
                    { heading: "Vehicle", fields: [
                        ["Year",         get("Model Year")],
                        ["Make",         get("Make")],
                        ["Model",        get("Model")],
                        ["Trim",         get("Trim")],
                        ["Series",       get("Series")],
                        ["Body Class",   get("Body Class")],
                        ["Vehicle Type", get("Vehicle Type")],
                        ["Doors",        get("Doors")],
                        ["Seats",        get("Number of Seats")],
                    ]},
                    { heading: "Engine / Drivetrain", fields: [
                        ["Engine",        get("Engine Model")],
                        ["Displacement",  get("Displacement (L)") !== "N/A" ? get("Displacement (L)") + "L" : "N/A"],
                        ["Cylinders",     get("Engine Number of Cylinders")],
                        ["Horsepower",    get("Engine Brake (hp) From") !== "N/A" ? get("Engine Brake (hp) From") + " hp" : "N/A"],
                        ["Fuel Type",     get("Fuel Type - Primary")],
                        ["Drive Type",    get("Drive Type")],
                        ["Transmission",  get("Transmission Style")],
                        ["Trans. Speeds", get("Transmission Speeds")],
                    ]},
                    { heading: "Chassis", fields: [
                        ["Wheelbase",        get("Wheel Base (inches) From") !== "N/A" ? get("Wheel Base (inches) From") + " in" : "N/A"],
                        ["Wheel Size Front", get("Wheel Size Front (inches)") !== "N/A" ? get("Wheel Size Front (inches)") + " in" : "N/A"],
                        ["Wheel Size Rear",  get("Wheel Size Rear (inches)") !== "N/A" ? get("Wheel Size Rear (inches)") + " in" : "N/A"],
                        ["GVWR",             get("Gross Vehicle Weight Rating From")],
                    ]},
                    { heading: "Safety", fields: [
                        ["ABS",           get("Anti-lock Braking System (ABS)")],
                        ["ESC",           get("Electronic Stability Control (ESC)")],
                        ["Backup Camera", get("Backup Camera")],
                        ["TPMS",          get("Tire Pressure Monitoring System (TPMS) Type")],
                    ]},
                    { heading: "Manufacturing", fields: [
                        ["Manufacturer", get("Manufacturer Name")],
                        ["Plant City",   get("Plant City")],
                        ["Plant State",  get("Plant State")],
                        ["Plant Country",get("Plant Country")],
                    ]},
                ];

                let html = `
                    <div class="result-header">
                        <div class="result-year-make">${val(get("Model Year"))} ${val(get("Make"))} ${val(get("Model"))}</div>
                        <div class="result-vin">${vin}</div>
                    </div>
                `;

                for (const section of sections) {
                    const hasData = section.fields.some(([, v]) => v !== "N/A");
                    if (!hasData) continue;
                    html += `<div class="result-section-heading">${section.heading}</div>`;
                    html += `<div class="info-grid">`;
                    for (const [label, value] of section.fields) {
                        if (value === "N/A") continue;
                        html += `
                            <div class="info-card">
                                <div class="info-label">${escapeHtml(label)}</div>
                                <div class="info-value">${escapeHtml(value)}</div>
                            </div>`;
                    }
                    html += `</div>`;
                }

                resultDiv.innerHTML = html;

            } catch (err) {
                console.error(err);
                errorDiv.textContent = "Failed to fetch VIN data from NHTSA.";
                resultDiv.innerHTML = "";
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function hardRefresh() {
            const url = new URL(window.location.href);
            url.searchParams.set("refresh", Date.now());
            window.location.href = url.toString();
        }

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./serviceworker.js")
                    .then(reg => console.log("SW registered:", reg.scope))
                    .catch(err => console.error("SW failed:", err));
            });
        }

    </script>

</body>

</html>
